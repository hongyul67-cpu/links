<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>학습 도구 모음</title>
<!--
  공유 모음 뷰어
  ─────────────────────────────────────────────────────────
  주소(?d=)에 담긴 도구 목록만 보여줍니다.
  이 파일에는 전체 도구 목록이 없습니다 → 공유해도 다른 도구가 노출되지 않아요.
  링크는 "링크모음 마스터"에서 만듭니다.

  ⛔ 이미 나눠준 링크들이 "이 파일"을 계속 불러옵니다.
     · 이 파일을 고치면 예전에 준 링크에도 바로 반영됩니다 (보통은 좋은 일 — 개선이 자동 전파).
     · 그러나 아래는 절대 금지 → 예전 링크가 전부 깨집니다:
         1) 이 파일의 이름/위치 변경·삭제  (예전 링크가 404)
         2) ?d= 데이터 형식(필드 순서/이름) 변경
         3) links 저장소 삭제 또는 Pages 끄기
     · 형식을 바꿔야 하면: 새 버전 번호(v)를 쓰고, 아래에서 옛 버전(v1)도 계속 처리하세요.
-->
<style>
  :root{--bg:#0f1420;--card:#1a2130;--card2:#222c40;--line:#2c3852;--tx:#eef2fb;--dim:#9aa7c2;
        --accent:#5b8cff;--game:#38d39f;--concept:#5b8cff;--quiz:#f0a742}
  @media (prefers-color-scheme: light){:root{--bg:#f3f5fb;--card:#fff;--card2:#f7f9ff;--line:#e3e8f4;
        --tx:#1a2233;--dim:#5c6a86;--accent:#3565e6;--game:#12a97a;--concept:#3565e6;--quiz:#d98518}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font-family:"Pretendard","Segoe UI",system-ui,sans-serif;line-height:1.5}
  .wrap{max-width:920px;margin:0 auto;padding:28px 18px 60px}
  h1{font-size:26px;margin:0 0 6px;letter-spacing:-.02em}
  .sub{color:var(--dim);font-size:14px}
  details.section{margin:14px 0 0;border-top:1px solid var(--line)}
  details.section:first-of-type{border-top:0}
  summary.cat{list-style:none;cursor:pointer;display:flex;align-items:center;gap:9px;padding:14px 2px 12px;
    font-size:15px;font-weight:800;color:var(--tx)}
  summary.cat::-webkit-details-marker{display:none}
  .chev{color:var(--accent);font-size:13px;transition:transform .18s;display:inline-block}
  details[open] .chev{transform:rotate(90deg)}
  .count{margin-left:auto;font-size:12px;font-weight:600;color:var(--dim);background:var(--card);
    border:1px solid var(--line);border-radius:999px;padding:1px 9px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:2px 0 6px}
  details.section:not([open]) > .grid{display:none}
  a.card{display:block;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:15px 16px;transition:.12s}
  a.card:hover{transform:translateY(-2px);border-color:var(--accent);background:var(--card2)}
  .name{font-size:16px;font-weight:700;margin:0 0 4px;display:flex;align-items:center;gap:8px}
  .emoji{font-size:18px}
  .desc{color:var(--dim);font-size:13px;margin:0}
  .meta{display:flex;align-items:center;gap:8px;margin-top:10px}
  .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
  .tag.t-game{color:var(--game);background:color-mix(in srgb,var(--game) 15%,transparent)}
  .tag.t-concept{color:var(--concept);background:color-mix(in srgb,var(--concept) 15%,transparent)}
  .tag.t-quiz{color:var(--quiz);background:color-mix(in srgb,var(--quiz) 15%,transparent)}
  footer{margin-top:34px;color:var(--dim);font-size:12px;text-align:center}
  .rcbar{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:16px 0 4px}
  .rcnow{font-size:13.5px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .rcnow .st{flex:1;min-width:180px}
  .rcnow button{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:7px 12px;
    font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
  .rcnow button.ghost{background:var(--card2);color:var(--tx);border:1px solid var(--line)}
  .rcform{margin-top:10px;display:none}
  .rcform input{width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;background:var(--card2);
    color:var(--tx);font-size:13px;font-family:inherit}
  .rcform .frow{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
  .rcform a{color:var(--accent);font-size:12.5px}
  .rcerr{color:#ef4444;font-size:12.5px;margin-top:6px;min-height:16px}
  .ok{color:var(--game);font-weight:700}
  .bad{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;color:var(--dim);font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <header><h1 id="ttl">학습 도구 모음</h1><div class="sub" id="sub"></div></header>
  <div id="rcwrap"></div>
  <div id="app"></div>
  <footer id="ft"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<script>
var GH_USER="hongyul67-cpu";
var TYPE_ORDER={"게임":0,"개념":1,"문제풀이":2};
var TYPE_CLASS={"게임":"t-game","개념":"t-concept","문제풀이":"t-quiz"};
var LSK="rc_endpoint_v1";

function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function qp(n){try{return new URLSearchParams(location.search).get(n);}catch(e){return null;}}
function rank(t){return (t.type&&t.type in TYPE_ORDER)?TYPE_ORDER[t.type]:99;}

/* 주소(?d=)에서 모음 데이터 복원 */
var DATA=null;
try{
  var raw=qp("d");
  if(raw && window.LZString){
    var json=LZString.decompressFromEncodedURIComponent(raw);
    if(json) DATA=JSON.parse(json);
  }
}catch(e){ DATA=null; }

/* 지원하는 최신 형식 번호. 형식을 바꾸면 올리되, 옛 버전 처리는 지우지 말 것 */
var FMT_MAX = 2;
var VER = (DATA && DATA.v) ? DATA.v : 1;   // v 없는 옛 링크 = 1로 취급

if(!DATA || !DATA.l || !DATA.l.length){
  document.getElementById("app").innerHTML =
    '<div class="bad">😅 도구 목록을 불러오지 못했어요.<br>선생님께 받은 링크가 잘린 것 같아요 — 전체 주소를 다시 받아 주세요.</div>';
} else if(VER > FMT_MAX){
  // 마스터가 뷰어보다 새 형식으로 만든 링크 (배포 순서가 어긋난 경우)
  document.getElementById("app").innerHTML =
    '<div class="bad">🔄 이 링크는 최신 형식이라 아직 열 수 없어요.<br>잠시 후 새로고침하거나, 선생님께 알려 주세요.</div>';
} else {
  /* ── 형식 v1 읽기 ── (예전 링크가 이 코드에 의존합니다. 지우지 마세요) */
  var TITLE=DATA.t||"학습 도구 모음";
  var BAKED_RC=DATA.r||"";
  var ALLOW_RC=!!DATA.a;
  /* 압축용 배열 → 원래 형태로.
     v1: [emoji,name,desc,repo,url,cat,type]  ·  v2(간결): [emoji,name,repo,url,cat,type] (desc 없음) */
  var TOOLS=DATA.l.map(function(a){
    return (VER>=2)
      ? { emoji:a[0]||"🔗", name:a[1]||"", desc:"",      repo:a[2]||"", url:a[3]||"", cat:a[4]||"기타", type:a[5]||"" }
      : { emoji:a[0]||"🔗", name:a[1]||"", desc:a[2]||"", repo:a[3]||"", url:a[4]||"", cat:a[5]||"기타", type:a[6]||"" };
  });
  var CATEGORIES=DATA.c||[];   // v2 엔 c 없음 → 도구 등장 순서로 분류

  document.title=TITLE;
  document.getElementById("ttl").textContent=TITLE;
  document.getElementById("ft").textContent=TITLE;
  document.getElementById("sub").textContent = ALLOW_RC
    ? "아래 카드를 누르면 도구가 열려요 · 결과를 받으려면 먼저 [내 시트 연결]"
    : (BAKED_RC ? "아래 카드를 누르면 도구가 열려요 · 결과는 선생님께 자동 제출됩니다"
                : "아래 카드를 누르면 도구가 열려요");

  function myRc(){try{return localStorage.getItem(LSK)||"";}catch(e){return "";}}
  function curRc(){return (ALLOW_RC&&myRc())||BAKED_RC||"";}
  function validRc(u){return /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/.test(u);}
  function linkOf(t){
    var u=t.url||("https://"+GH_USER+".github.io/"+t.repo+"/");
    var rc=curRc();
    if(rc&&t.repo)u+=(u.indexOf("?")<0?"?":"&")+"rc="+encodeURIComponent(rc);
    return u;
  }

  var app=document.getElementById("app");
  function render(){
    app.innerHTML="";
    var cats=CATEGORIES.slice();
    TOOLS.forEach(function(t){ if(t.cat&&cats.indexOf(t.cat)<0)cats.push(t.cat); });
    cats.forEach(function(cat){
      var items=TOOLS.map(function(t,i){return {t:t,i:i};}).filter(function(o){return (o.t.cat||"기타")===cat;})
        .sort(function(a,b){return (rank(a.t)-rank(b.t))||(a.i-b.i);}).map(function(o){return o.t;});
      if(!items.length)return;
      var det=document.createElement("details"); det.className="section"; det.open=true;
      var cards=items.map(function(t){
        var tag=t.type?'<span class="tag '+(TYPE_CLASS[t.type]||"")+'">'+esc(t.type)+'</span>':"";
        var d=t.desc?'<p class="desc">'+esc(t.desc)+'</p>':'';
        return '<a class="card" href="'+esc(linkOf(t))+'"><p class="name"><span class="emoji">'+esc(t.emoji)+
               '</span>'+esc(t.name)+'</p>'+d+'<div class="meta">'+tag+'</div></a>';
      }).join("");
      det.innerHTML='<summary class="cat"><span class="chev">▸</span>'+esc(cat)+
                    '<span class="count">'+items.length+'</span></summary><div class="grid">'+cards+'</div>';
      app.appendChild(det);
    });
  }
  render();

  if(ALLOW_RC){
    document.getElementById("rcwrap").innerHTML =
      '<div class="rcbar"><div class="rcnow"><span class="st" id="rcst"></span>'+
      '<button id="rcopen">내 시트 연결</button>'+
      '<button class="ghost" id="rcclear" style="display:none">해제</button></div>'+
      '<div class="rcform" id="rcform"><input id="rcinput" type="text" placeholder="https://script.google.com/macros/s/.../exec">'+
      '<div class="frow"><button id="rcsave">저장</button><button class="ghost" id="rccancel">취소</button>'+
      '<a href="./guide.html" target="_blank">주소 만드는 법 (5분) →</a></div>'+
      '<div class="rcerr" id="rcerr"></div></div></div>';
    var st=document.getElementById("rcst"), form=document.getElementById("rcform"),
        input=document.getElementById("rcinput"), errEl=document.getElementById("rcerr"),
        openBtn=document.getElementById("rcopen"), clearBtn=document.getElementById("rcclear");
    function paint(){
      var mine=myRc();
      if(mine){ st.innerHTML='✅ <b class="ok">내 구글시트로 결과 수신 중</b>'; openBtn.textContent="주소 변경"; clearBtn.style.display=""; }
      else if(BAKED_RC){ st.innerHTML='📮 결과가 <b>공유해준 선생님 시트</b>로 갑니다 · 내 시트로 받으려면 →'; openBtn.textContent="내 시트 연결"; clearBtn.style.display="none"; }
      else { st.innerHTML='📌 결과를 <b>내 구글시트</b>로 받으려면 주소를 연결하세요 (안 하면 제출 버튼이 안 보여요)'; openBtn.textContent="내 시트 연결"; clearBtn.style.display="none"; }
      render();
    }
    openBtn.onclick=function(){ input.value=myRc()||""; form.style.display="block"; errEl.textContent=""; input.focus(); };
    document.getElementById("rccancel").onclick=function(){ form.style.display="none"; };
    document.getElementById("rcsave").onclick=function(){
      var v=(input.value||"").trim();
      if(!validRc(v)){ errEl.textContent="주소를 확인하세요. script.google.com/macros/s/.../exec 형태여야 해요."; return; }
      try{ localStorage.setItem(LSK,v); }catch(e){}
      form.style.display="none"; paint();
    };
    clearBtn.onclick=function(){ try{ localStorage.removeItem(LSK); }catch(e){} paint(); };
    paint();
  }
}
</script>
</body>
</html>
