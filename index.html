<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>내 배포 도구 모음</title>
<style>
  :root{
    --bg:#0f1420; --card:#1a2130; --card2:#222c40; --line:#2c3852;
    --tx:#eef2fb; --dim:#9aa7c2; --accent:#5b8cff; --accent2:#38d39f;
    --game:#38d39f; --concept:#5b8cff; --quiz:#f0a742;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f3f5fb; --card:#ffffff; --card2:#f7f9ff; --line:#e3e8f4;
           --tx:#1a2233; --dim:#5c6a86; --accent:#3565e6; --accent2:#12a97a;
           --game:#12a97a; --concept:#3565e6; --quiz:#d98518; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);
    font-family:"Pretendard","Segoe UI",system-ui,-apple-system,sans-serif;
    line-height:1.5;-webkit-text-size-adjust:100%}
  .wrap{max-width:920px;margin:0 auto;padding:28px 18px 60px}
  header{margin:8px 0 20px}
  h1{font-size:26px;margin:0 0 6px;letter-spacing:-.02em}
  .sub{color:var(--dim);font-size:14px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:14px 0 4px;font-size:12px;color:var(--dim)}
  .legend b{font-weight:700}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}

  /* 접기/펴기 섹션 */
  details.section{margin:14px 0 0;border-top:1px solid var(--line)}
  details.section:first-of-type{border-top:0}
  summary.cat{list-style:none;cursor:pointer;display:flex;align-items:center;gap:9px;
    padding:14px 2px 12px;font-size:15px;font-weight:800;letter-spacing:-.01em;color:var(--tx)}
  summary.cat::-webkit-details-marker{display:none}
  summary.cat:hover{color:var(--accent)}
  .chev{color:var(--accent);font-size:13px;transition:transform .18s ease;display:inline-block}
  details[open] .chev{transform:rotate(90deg)}
  .count{margin-left:auto;font-size:12px;font-weight:600;color:var(--dim);
    background:var(--card);border:1px solid var(--line);border-radius:999px;padding:1px 9px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:2px 0 6px}
  details.section:not([open]) > .grid{display:none}  /* 닫힘 상태에서 그리드 숨김(display:grid가 기본 숨김을 덮는 문제 보정) */
  a.card{display:block;text-decoration:none;color:inherit;background:var(--card);
    border:1px solid var(--line);border-radius:14px;padding:15px 16px;
    transition:transform .12s ease,border-color .12s ease,background .12s ease}
  a.card:hover{transform:translateY(-2px);border-color:var(--accent);background:var(--card2)}
  .name{font-size:16px;font-weight:700;margin:0 0 4px;display:flex;align-items:center;gap:8px}
  .emoji{font-size:18px}
  .desc{color:var(--dim);font-size:13px;margin:0}
  .meta{display:flex;align-items:center;gap:8px;margin-top:10px}
  .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .tag.t-game{color:var(--game);background:color-mix(in srgb,var(--game) 15%,transparent)}
  .tag.t-concept{color:var(--concept);background:color-mix(in srgb,var(--concept) 15%,transparent)}
  .tag.t-quiz{color:var(--quiz);background:color-mix(in srgb,var(--quiz) 15%,transparent)}
  .url{color:var(--accent);font-size:11.5px;word-break:break-all;opacity:.85}
  footer{margin-top:34px;color:var(--dim);font-size:12px;text-align:center}
</style>

<div class="wrap">
  <header>
    <h1>🔗 내 배포 도구 모음</h1>
    <div class="sub">과목별로 묶었어요 · 제목의 ▸ 를 누르면 접고 펼 수 있어요</div>
    <div class="legend">
      정렬:
      <span><span class="dot" style="background:var(--game)"></span><b>게임</b>(위)</span>
      <span><span class="dot" style="background:var(--concept)"></span><b>개념·소게임</b>(가운데)</span>
      <span><span class="dot" style="background:var(--quiz)"></span><b>문제풀이·CBT</b>(아래)</span>
    </div>
  </header>
  <div id="app"></div>
  <footer>GitHub: hongyul67-cpu</footer>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════
   ▼▼▼ 새 도구를 추가하려면 아래 목록에 한 줄만 넣으면 됩니다 ▼▼▼

   형식:  { emoji:"🙂", name:"도구 이름", desc:"한 줄 설명",
            repo:"저장소이름", cat:"분류", type:"게임" }

   · repo : GitHub 저장소 이름만 적으면 링크 자동 생성
            (다른 주소면 repo 대신  url:"https://..."  사용)
   · cat  : 같은 분류(과목)끼리 묶임. CATEGORIES 순서대로 나옴
   · type : 그룹 안 정렬 순서 →  "게임"(위) · "개념"(가운데) · "문제풀이"(아래)
            비워두면 아래쪽, 넣은 순서 유지 (교사 업무 도구 등)
   ══════════════════════════════════════════════════════════════════ */

const GH_USER = "hongyul67-cpu";

const CATEGORIES = [
  "자동화설비 · 기계",
  "3D프린터운용기능사",
  "기초학력 (국·영·수)",
  "교사 업무 도구",
];

// 그룹 안 정렬: 순수 게임(위) → 개념·소게임(가운데) → 문제풀이·CBT(아래)
const TYPE_ORDER = { "게임":0, "개념":1, "문제풀이":2 };
const TYPE_CLASS = { "게임":"t-game", "개념":"t-concept", "문제풀이":"t-quiz" };

const TOOLS = [
  // ── 자동화설비 · 기계 ──
  { emoji:"📐", name:"자동화설비기능사 실기 도면게임", desc:"공개도면 문제게임 3모드(해독·3D매칭·치수찾기) + 편집기", repo:"automation-practical-exam", cat:"자동화설비 · 기계", type:"게임" },
  { emoji:"🧩", name:"블록 뷰 매칭", desc:"정투상도(투상도) 연습 게임", repo:"block-view-matching", cat:"자동화설비 · 기계", type:"게임" },
  { emoji:"🔍", name:"도면읽기 마스터", desc:"선의 종류 · 치수 읽기 · 기계요소 약도 + 종합시험", repo:"domyeon-master", cat:"자동화설비 · 기계", type:"개념" },
  { emoji:"⚡", name:"시퀀스 · PLC 학습 게임", desc:"시퀀스 · PLC 개념 + 게임", repo:"sequence-plc-master", cat:"자동화설비 · 기계", type:"개념" },
  { emoji:"🧊", name:"단면도 익스플로러", desc:"기계 부품 단면도 원리를 3D로 체험 (SolidWorks 입문 전)", repo:"section-view-explorer", cat:"자동화설비 · 기계", type:"개념" },
  { emoji:"📝", name:"자동화설비기능사 필기 CBT", desc:"18회차 1080문항 · 모의고사 · 과목별 학습 · 오답노트", repo:"automation-equipment-exam", cat:"자동화설비 · 기계", type:"문제풀이" },

  // ── 3D프린터운용기능사 ──
  { emoji:"🖨️", name:"3D프린터운용기능사 필기", desc:"개념 + 기출 92문항 · 오답노트 학습게임", repo:"3dprinter-master", cat:"3D프린터운용기능사", type:"문제풀이" },

  // ── 기초학력 (국·영·수) ──
  { emoji:"📊", name:"기초학력 진단 도구", desc:"중학생 국·영·수 60문항 채점 + 결과 이미지 출력", repo:"gicho-hakryeok-master", cat:"기초학력 (국·영·수)", type:"문제풀이" },

  // ── 교사 업무 도구 (정렬 없음, 넣은 순서) ──
  { emoji:"✍️", name:"생기부 문장 생성기", desc:"행동특성 · 세부능력특기사항 문장 생성", repo:"saenggibu-generator", cat:"교사 업무 도구" },
  { emoji:"🤖", name:"실습과제 도구 모음", desc:"과제 양식 만들기 · 과제 목록 · 채점(교사용) · 제출 도구", repo:"ai-task-tools", cat:"교사 업무 도구" },
  { emoji:"💬", name:"상담 일지 도구", desc:"상담 내용 기록 · 관리", repo:"counseling", cat:"교사 업무 도구" },
  { emoji:"🏫", name:"사회생활 수업 학습 도구", desc:"사회생활 수업용 학습 도구 모음", repo:"social-life-tools", cat:"교사 업무 도구" },
  { emoji:"📅", name:"방학 시간표 관리", desc:"방학 계획 · 시간표 관리 웹앱", repo:"vacation-schedule", cat:"교사 업무 도구" },
  { emoji:"🎱", name:"구슬 낙하 뽑기", desc:"공이 못·서로 부딪히며 떨어져 발표 순서·당번 추첨 (물리 시뮬레이션)", repo:"pinball-picker", cat:"교사 업무 도구" },
  { emoji:"📥", name:"결과수집 링크 생성기", desc:"학습도구 결과를 내 구글시트로 모으기 · 교사별 공유 링크 자동 생성", url:"./link-builder.html", cat:"교사 업무 도구" },
  { emoji:"📖", name:"결과수집 설정 가이드", desc:"내 구글시트 연결 방법 (교사용, 컴퓨터로 5분)", url:"./guide.html", cat:"교사 업무 도구" },

  /* ▼ 새 도구는 이 아래에 한 줄씩 추가하세요 ▼ */

];

/* ── 여기부터는 건드릴 필요 없어요 (카드 자동 생성) ────────────────── */
function linkOf(t){ return t.url || `https://${GH_USER}.github.io/${t.repo}/`; }
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function rank(t){ return (t.type && t.type in TYPE_ORDER) ? TYPE_ORDER[t.type] : 99; }

const app = document.getElementById("app");
const cats = CATEGORIES.slice();
TOOLS.forEach(t => { if(t.cat && !cats.includes(t.cat)) cats.push(t.cat); });

cats.forEach(cat => {
  // 그룹 안에서 유형 순으로 정렬 (게임→개념→문제풀이, 같은 유형은 넣은 순서 유지)
  const items = TOOLS
    .map((t,i) => ({t,i}))
    .filter(o => (o.t.cat||"기타") === cat)
    .sort((a,b) => (rank(a.t)-rank(b.t)) || (a.i-b.i))
    .map(o => o.t);
  if(!items.length) return;

  const det = document.createElement("details");
  det.className = "section";
  det.open = true;

  const cards = items.map(t => {
    const tag = t.type ? `<span class="tag ${TYPE_CLASS[t.type]||""}">${esc(t.type)}</span>` : "";
    return `
    <a class="card" href="${esc(linkOf(t))}">
      <p class="name"><span class="emoji">${esc(t.emoji||"🔗")}</span>${esc(t.name)}</p>
      <p class="desc">${esc(t.desc||"")}</p>
      <div class="meta">${tag}<span class="url">${esc(t.repo || linkOf(t))}</span></div>
    </a>`;
  }).join("");

  det.innerHTML =
    `<summary class="cat"><span class="chev">▸</span>${esc(cat)}<span class="count">${items.length}</span></summary>` +
    `<div class="grid">${cards}</div>`;
  app.appendChild(det);
});
</script>
