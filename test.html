<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>연결 테스트</title>
<style>
  :root{--bg:#f8fafc;--card:#fff;--ink:#0f172a;--sub:#64748b;--line:#e2e8f0;--brand:#6366f1;--ok:#16a34a;--err:#dc2626}
  *{box-sizing:border-box}
  body{font-family:system-ui,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);margin:0;padding:24px 16px;line-height:1.55}
  .wrap{max-width:520px;margin:0 auto}
  h1{font-size:21px;margin:0 0 4px}
  .lead{color:var(--sub);font-size:14px;margin:0 0 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
  label{display:block;font-size:13px;font-weight:700;margin:0 0 6px}
  input{width:100%;padding:12px;font-size:15px;border:1px solid #cbd5e1;border-radius:9px}
  input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
  button{width:100%;margin-top:12px;border:0;border-radius:10px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;background:var(--brand);color:#fff}
  button:disabled{opacity:.6;cursor:default}
  .msg{margin-top:14px;font-size:14px;text-align:center;min-height:20px;font-weight:700}
  .msg.ok{color:var(--ok)}.msg.err{color:var(--err)}
  .steps{font-size:13px;color:#334155;margin:10px 0 0;padding-left:18px}
  .steps li{margin:5px 0}
  .big{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:10px;padding:12px;font-size:14px;color:#065f46;margin-top:12px}
  code{background:#f1f5f9;padding:1px 5px;border-radius:4px;font-size:12px;word-break:break-all}
</style>
</head>
<body>
<div class="wrap">
  <h1>🔌 연결 테스트</h1>
  <p class="lead">내 구글 시트가 결과를 잘 받는지 <b>지금 바로</b> 확인합니다. 학생 링크를 만들기 전에 이걸로 먼저 확인하세요.</p>

  <div class="card">
    <label>내 Apps Script 주소 (exec URL)</label>
    <input id="url" type="text" placeholder="https://script.google.com/macros/s/AKfyc.../exec">
    <button id="go">테스트 한 줄 보내기</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="card">
    <b style="font-size:14px">보낸 뒤 할 일</b>
    <ol class="steps">
      <li>내 구글 시트를 열어요 (폰이면 <b>구글 스프레드시트 앱</b>)</li>
      <li>아래쪽에 <code>연결테스트</code> 라는 <b>탭</b>이 새로 생기고, 그 안에 한 줄이 들어와 있으면 <b>성공</b>이에요.</li>
    </ol>
    <div class="big">✅ 줄이 들어왔다면 설정 끝! 이제 <b>링크 생성기</b>에서 학생용 링크를 만들면 됩니다.</div>
  </div>
</div>

<script>
  // ?rc= 로 미리 주소를 채울 수 있음
  try {
    var pre = new URLSearchParams(location.search).get('rc');
    if (pre) document.getElementById('url').value = pre;
  } catch (e) {}

  var elUrl = document.getElementById('url');
  var elGo = document.getElementById('go');
  var elMsg = document.getElementById('msg');

  function valid(u){ return /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/.test(u); }

  elGo.addEventListener('click', function () {
    var url = elUrl.value.trim();
    if (!valid(url)) {
      elMsg.className = 'msg err';
      elMsg.textContent = '주소를 확인하세요. .../exec 형태여야 해요.';
      return;
    }
    elGo.disabled = true;
    elMsg.className = 'msg';
    elMsg.textContent = '보내는 중…';

    var body = {
      tool: '연결테스트',
      cls: '테스트', num: '0',
      score: 100, correct: 10, total: 10, wrong: [], durationSec: 0,
      ua: navigator.userAgent
    };

    // Apps Script 표준 패턴: text/plain 으로 보내 CORS preflight 회피
    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body)
    })
      .then(function (r) { return r.json().catch(function () { return { ok: true }; }); })
      .then(function (res) {
        if (res && res.ok === false) throw new Error(res.error || '서버 오류');
        elMsg.className = 'msg ok';
        elMsg.textContent = '✔ 보냈어요! 이제 내 구글 시트를 확인하세요.';
      })
      .catch(function (err) {
        elGo.disabled = false;
        elMsg.className = 'msg err';
        elMsg.textContent = '실패: ' + err.message + ' — 아래 "안 될 때"를 확인하세요.';
      });
  });
</script>
</body>
</html>
