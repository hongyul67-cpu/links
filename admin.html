<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>선생님 설정 · 학생 링크 만들기</title>
<!--
  admin(선생님 설정) 페이지  ─  마스터 → admin → user 3단 구조의 가운데
  ─────────────────────────────────────────────────────────
  · 마스터가 만든 admin 링크(?d=)에는 "고른 도구 목록"만 담겨 있습니다(전체 목록 아님).
  · 이 페이지는 고정으로: ① 결과수집(exec) 연결 안내 ② exec 입력칸 ③ 학생 링크·QR 생성 을 제공합니다.
  · 선생님은 자기 exec 주소만 넣으면 → 학생용(user) 링크가 자동으로 만들어집니다.
  ⛔ ?d= 데이터 형식(필드 순서/이름)은 s.html·user.html 과 동일합니다. 바꾸지 마세요.
-->
<style>
  :root{--bg:#0f1420;--card:#1a2130;--card2:#222c40;--line:#2c3852;--tx:#eef2fb;--dim:#9aa7c2;
        --accent:#5b8cff;--ok:#38d39f;--warn:#f0a742;--game:#38d39f;--concept:#5b8cff;--quiz:#f0a742}
  @media (prefers-color-scheme: light){:root{--bg:#f3f5fb;--card:#fff;--card2:#f7f9ff;--line:#e3e8f4;
        --tx:#1a2233;--dim:#5c6a86;--accent:#3565e6;--ok:#12a97a;--warn:#d98518;--game:#12a97a;--concept:#3565e6;--quiz:#d98518}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font-family:"Pretendard","Segoe UI",system-ui,sans-serif;line-height:1.5;padding:26px 16px 60px}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:23px;margin:0 0 6px}
  .sub{color:var(--dim);font-size:13.5px;margin:0 0 14px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px;margin-bottom:14px}
  .panel h2{font-size:15px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
  .step{background:var(--accent);color:#fff;font-size:12px;font-weight:800;border-radius:50%;width:22px;height:22px;
    display:inline-flex;align-items:center;justify-content:center;flex:0 0 22px}
  .hint{color:var(--dim);font-size:12.5px;margin:5px 0 0}
  label.fld{display:block;font-size:12.5px;font-weight:700;margin:4px 0 5px}
  input[type=text]{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;background:var(--card2);color:var(--tx);font-size:13.5px;font-family:inherit}
  input[type=text]:focus{outline:none;border-color:var(--accent)}
  .err{color:#ef4444;font-size:12.5px;margin-top:6px;min-height:16px}
  .ok{color:var(--ok);font-weight:700}
  a.guide{color:var(--accent);font-size:12.5px}
  .go{width:100%;background:var(--accent);color:#fff;border:0;border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:10px}
  .go:disabled{opacity:.45;cursor:default}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 0;justify-content:center}
  .row button{background:var(--card2);color:var(--tx);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:12.5px;cursor:pointer;font-family:inherit}
  a.dl{background:var(--accent);color:#fff;border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:700;text-decoration:none;display:inline-block}
  .out{margin-top:12px;background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:10px;font-size:11.5px;word-break:break-all;color:var(--accent);display:none}
  #qrBox{display:none;margin-top:12px;text-align:center}
  #qrImg{width:230px;height:230px;margin:0 auto;background:#fff;border-radius:10px;padding:8px}
  #qrImg img{width:100%;height:100%;image-rendering:pixelated;display:block}
  /* 도구 미리보기 */
  .plist{margin-top:6px}
  .pcat{font-size:12px;font-weight:800;color:var(--accent);margin:10px 0 4px}
  .pitem{display:flex;align-items:center;gap:8px;padding:4px 2px;font-size:13px;color:var(--tx)}
  .pitem .rcbadge{font-size:10px;color:var(--ok);border:1px solid var(--ok);border-radius:999px;padding:0 6px;margin-left:auto;white-space:nowrap}
  .bad{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;color:var(--dim);font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🧑‍🏫 선생님 설정</h1>
  <p class="sub" id="sub">내 결과수집 주소(exec)만 연결하면, <b>학생에게 줄 링크·QR</b>이 바로 만들어져요.</p>
  <div id="body"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script>
var GH_USER="hongyul67-cpu";
var USER_VIEWER="https://hongyul67-cpu.github.io/links/user.html";  // 유저(학생) 뷰어(links 저장소)
var GUIDE_URL="https://hongyul67-cpu.github.io/links/guide.html";          // exec 만드는 법(안내) — 고정
var SHARE_FMT=1;
var TYPE_ORDER={"게임":0,"개념":1,"문제풀이":2};

function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function qp(n){try{return new URLSearchParams(location.search).get(n);}catch(e){return null;}}
function rank(t){return (t.type&&t.type in TYPE_ORDER)?TYPE_ORDER[t.type]:99;}
function validRc(u){return /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/.test(u);}

/* 마스터가 만든 admin 링크(?d=)에서 도구 목록 복원 */
var DATA=null;
try{
  var raw=qp("d");
  if(raw && window.LZString){
    var json=LZString.decompressFromEncodedURIComponent(raw);
    if(json) DATA=JSON.parse(json);
  }
}catch(e){ DATA=null; }

var bodyEl=document.getElementById("body");

if(!DATA || !DATA.l || !DATA.l.length){
  bodyEl.innerHTML='<div class="bad">😅 도구 목록을 불러오지 못했어요.<br>관리자(마스터)에게서 받은 <b>admin 링크 전체 주소</b>를 다시 열어 주세요.</div>';
} else {
  var VER=DATA.v||1;
  var TITLE=DATA.t||"학습 도구 모음";
  var CATEGORIES=DATA.c||[];
  var RAW_L=DATA.l;   // 압축 배열 그대로 (유저 링크 만들 때 재사용)
  /* v1: [emoji,name,desc,repo,url,cat,type]  ·  v2(간결): [emoji,name,repo,url,cat,type] */
  var TOOLS=RAW_L.map(function(a){
    return (VER>=2)
      ? { emoji:a[0]||"🔗", name:a[1]||"", repo:a[2]||"", url:a[3]||"", cat:a[4]||"기타", type:a[5]||"" }
      : { emoji:a[0]||"🔗", name:a[1]||"", repo:a[3]||"", url:a[4]||"", cat:a[5]||"기타", type:a[6]||"" };
  });
  document.getElementById("sub").innerHTML =
    '<b>'+esc(TITLE)+'</b> · 도구 '+TOOLS.length+'개 · 내 결과수집 주소(exec)만 연결하면 <b>학생 링크·QR</b>이 만들어져요.';

  /* 도구 미리보기(카테고리별) */
  var cats=CATEGORIES.slice();
  TOOLS.forEach(function(t){ if(t.cat&&cats.indexOf(t.cat)<0)cats.push(t.cat); });
  var prev="";
  cats.forEach(function(cat){
    var items=TOOLS.filter(function(t){return (t.cat||"기타")===cat;})
      .sort(function(a,b){return rank(a)-rank(b);});
    if(!items.length)return;
    prev+='<div class="pcat">'+esc(cat)+'</div>';
    items.forEach(function(t){
      prev+='<div class="pitem"><span>'+esc(t.emoji)+'</span><span>'+esc(t.name)+'</span>'+
            (t.repo?'<span class="rcbadge">결과수집 대상</span>':'')+'</div>';
    });
  });

  bodyEl.innerHTML =
    '<div class="panel"><h2><span class="step">1</span>내 구글시트(exec) 연결</h2>'+
      '<label class="fld">내 결과수집 주소</label>'+
      '<input id="rc" type="text" placeholder="https://script.google.com/macros/s/.../exec">'+
      '<div class="err" id="err"></div>'+
      '<p class="hint">이 주소를 넣으면 학생 결과가 <b>내 구글시트</b>로 들어와요. '+
        '주소가 없으면 <a class="guide" href="'+GUIDE_URL+'" target="_blank">만드는 법 (교사용, 5분) →</a></p>'+
    '</div>'+
    '<div class="panel"><h2><span class="step">2</span>학생에게 줄 링크·QR</h2>'+
      '<p class="hint" style="margin:0 0 4px">주소 하나로 전달돼요. 학생은 QR만 스캔하면 바로 열리고, 결과는 내 시트로 옵니다.</p>'+
      '<button class="go" id="mk" disabled>🔗 학생 링크 + QR 만들기</button>'+
      '<div class="out" id="out"></div>'+
      '<div id="qrBox"><div id="qrImg"></div>'+
        '<div class="row"><button id="copy">링크 복사</button>'+
        '<a id="saveQr" class="dl" download="학생QR.png">QR 이미지 저장</a></div></div>'+
    '</div>'+
    '<div class="panel"><h2>📋 담긴 도구 ('+TOOLS.length+')</h2><div class="plist">'+prev+'</div></div>';

  var rcEl=document.getElementById("rc"), errEl=document.getElementById("err"), mk=document.getElementById("mk");
  function refresh(){
    var v=rcEl.value.trim();
    if(!v){ errEl.textContent=""; mk.disabled=true; return; }
    if(!validRc(v)){ errEl.textContent="주소 형식을 확인하세요. script.google.com/macros/s/.../exec 여야 해요."; mk.disabled=true; return; }
    errEl.innerHTML='<span class="ok">✔ 주소 확인됨 — 아래에서 학생 링크를 만드세요.</span>'; mk.disabled=false;
  }
  rcEl.addEventListener("input", refresh);

  function buildUserUrl(){
    /* 받은 형식(VER)을 그대로 echo + RAW_L 재사용 → user.html 이 동일하게 읽음. c 는 v2에선 불필요.
       exec 는 배포ID만(g) 담아 주소 단축 — 뷰어가 앞뒤를 붙여 복원. 형식 안 맞으면 전체주소(r). */
    var v=rcEl.value.trim();
    var m=/^https:\/\/script\.google\.com\/macros\/s\/(.+)\/exec$/.exec(v);
    var payload={ v:VER, t:TITLE, l:RAW_L };
    if(m) payload.g=m[1]; else payload.r=v;
    if(VER<2 && CATEGORIES.length) payload.c=CATEGORIES;
    return USER_VIEWER + "?d=" + LZString.compressToEncodedURIComponent(JSON.stringify(payload));
  }

  mk.onclick=function(){
    if(mk.disabled) return;
    var url=buildUserUrl();
    var out=document.getElementById("out"), qrBox=document.getElementById("qrBox"), box=document.getElementById("qrImg");
    out.style.display="block"; out.textContent=url;
    if(typeof qrcode==="undefined"){
      qrBox.style.display="block";
      box.innerHTML='<div style="color:#dc2626;font-size:12px;padding:20px">QR 라이브러리를 못 불러왔어요.<br>링크는 복사해서 쓰실 수 있어요.</div>';
      document.getElementById("saveQr").style.display="none"; return;
    }
    try{
      var qr=qrcode(0,"L"); qr.addData(url); qr.make();
      var mod=qr.getModuleCount(); var qver=(mod-17)/4;
      var cell=mod>100?8:10;
      var gif=qr.createDataURL(cell,4*cell);
      box.innerHTML='<img src="'+gif+'" alt="학생 QR">'; qrBox.style.display="block";
      var save=document.getElementById("saveQr"); save.style.display=""; save.href=gif;
      save.download=(TITLE.replace(/[\\/:*?"<>|]/g,"_")||"학생")+"_QR.gif";
      var im=new Image();
      im.onload=function(){ try{
        var c=document.createElement("canvas"); c.width=im.width; c.height=im.height;
        c.getContext("2d").drawImage(im,0,0);
        save.href=c.toDataURL("image/png"); save.download=save.download.replace(/\.gif$/,".png");
      }catch(e){} };
      im.src=gif;
      var grade=qver<=13?"QR 성겨서 스캔 아주 쉬워요 👍":qver<=17?"QR 스캔 양호 👍":qver<=21?"QR 조금 촘촘 — 도구가 적을수록 쉬워요":"QR 꽤 촘촘 — 도구를 나눠 2장으로 주면 스캔이 훨씬 쉬워요";
      out.textContent=url+"\n\n도구 "+TOOLS.length+"개 · 주소 "+url.length+"자 · QR "+mod+"칸(v"+qver+") · "+grade;
    }catch(e){
      qrBox.style.display="block";
      box.innerHTML='<div style="color:#dc2626;font-size:12px;padding:20px">주소가 너무 길어 QR을 못 만들었어요.</div>';
    }
  };

  document.getElementById("copy").onclick=function(){
    var b=this; navigator.clipboard.writeText(buildUserUrl()).then(function(){
      b.textContent="복사됨 ✓"; setTimeout(function(){ b.textContent="링크 복사"; },1500);
    });
  };
}
</script>
</body>
</html>
